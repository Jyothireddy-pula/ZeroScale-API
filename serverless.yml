service: zeroscale-api

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  memorySize: 128
  timeout: 30
  environment:
    MONGO_URI: ${env:MONGO_URI, 'mongodb://localhost:27017/zeroscale'}
    JWT_SECRET: ${env:JWT_SECRET, 'fallback-secret-for-local-dev-only'}
    JWT_EXPIRES_IN: ${env:JWT_EXPIRES_IN, '1h'}
    NODE_ENV: ${env:NODE_ENV, 'development'}

package:
  patterns:
    - '!**/*.ts'
    - 'dist/**/*.js'
    - 'node_modules/**'

functions:
  api:
    handler: index.handler
    events:
      - http:
          path: /
          method: any
          cors: true
      - http:
          path: /{proxy+}
          method: any
          cors: true

plugins:
  - serverless-offline
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    external:
      - aws-sdk
      - mongoose
    keepOutputDirectory: true
